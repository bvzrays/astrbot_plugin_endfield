# Runs on GitHub servers after code is pushed — does not replace `git push`.
# If local push fails with "Connection was reset", try: SSH remote, VPN/hotspot,
# or upload via github.com web editor.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check (compileall)
        run: python -m compileall -q .
